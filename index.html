<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form-validation</title>
    <link rel="stylesheet" href="valid.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div class="container">
        <h1>login/Registration</h1>
        <form class="form" id="form">

            <div class="form-controller ">
               <label for="username">Username</label>
               <input type="text" name="" id="username" class="username">
               <i class="fa fa-check"></i>
               <i class="fa fa-times"></i>
               <small>error message</small>
            </div>
              <div class="form-controller ">
                <label for="email">Email</label>
               <input type="text" name="" id="email" class="email">
               <i class="fa fa-check"></i>
               <i class="fa fa-times"></i>
               <small>error message</small>
            </div>
              <div class="form-controller">
                <label for="password">Password</label>
               <input type="password" name="" id="password" class="password">
               <i class="fa fa-check"></i>
               <i class="fa fa-times"></i>
               <small>error message</small>
            </div>
              <div class="form-controller">
                <label for="confirm-password">Confirm Password</label>
               <input type="password" name="" id="confirm-password" class="confirm-password">
               <i class="fa fa-check"></i>
               <i class="fa fa-times"></i>
               <small>error message</small>
            </div>
                <button type="submit" class="btn">Submit</button>
        </form>
    </div>
    <script src="Main.js">
    </script>
</body>
</html>
